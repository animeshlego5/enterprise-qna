services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - REDIS_CONSUMER_NAME=worker-1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # 15s lets the SIGTERM handler finish the current job before Docker SIGKILL.
    # Must exceed BLOCK_MS (5s) + worst-case job duration (~10s).
    stop_grace_period: 15s

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      - REDIS_CONSUMER_NAME=worker-2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    environment:
      # In Docker, Next.js rewrites /api/* to the api service by name.
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
